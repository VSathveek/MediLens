services:
  - type: web
    name: medilens-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app,http://localhost:5173
      - key: GEN_MODEL
        value: gemini-2.5-flash
      - key: RAG_TOP_K
        value: "5"
      - key: RAG_CONTEXT_DOCS
        value: "3"
      - key: RAG_CONTEXT_CHARS
        value: "500"
      - key: MAX_QUESTION_LENGTH
        value: "2000"
      - key: MAX_UPLOAD_BYTES
        value: "8388608"
